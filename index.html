<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZXYwatch - Native Controls</title>
    <style>
        /* --- CORE THEME --- */
        body { margin: 0; background-color: #0f0f0f; color: white; font-family: -apple-system, BlinkMacSystemFont, "Roboto", sans-serif; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 500px; height: 100%; background: #0f0f0f; display: flex; flex-direction: column; position: relative; border-left: 1px solid #333; border-right: 1px solid #333; }

        /* --- HEADER --- */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #222; z-index: 50; }
        .logo { font-weight: 900; font-size: 20px; letter-spacing: -1px; background: linear-gradient(to right, #ff0050, #ff4b4b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        
        .search-bar { flex: 1; margin: 0 15px; }
        .search-input { width: 100%; background: #222; border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 20px; outline: none; font-size: 14px; }
        
        .header-icons { display: flex; gap: 15px; align-items: center; }
        .icon-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding: 0; }
        .user-mini-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid #333; cursor: pointer; }

        /* --- FEED --- */
        .feed-container { flex: 1; overflow-y: auto; padding-bottom: 60px; scrollbar-width: none; }
        .feed-container::-webkit-scrollbar { display: none; }

        .video-card { background: #0f0f0f; margin-bottom: 20px; border-bottom: 8px solid #1a1a1a; padding-bottom: 15px; }
        
        /* MEDIA WRAPPER */
        .media-wrapper { width: 100%; aspect-ratio: 16/9; background: black; position: relative; overflow: hidden; cursor: pointer; }
        
        .video-thumbnail { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; transition: opacity 0.3s ease; z-index: 2; pointer-events: none; }
        .video-player { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0; z-index: 1; display: none; background: black; }
        
        /* META DATA */
        .meta-data { padding: 12px 15px 0 15px; }
        .video-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; display: block; line-height: 1.2; }
        .video-desc { font-size: 13px; color: #aaa; margin-bottom: 8px; white-space: pre-wrap; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-desc.expanded { -webkit-line-clamp: unset; color: #ccc; }
        .video-stats { color: #666; font-size: 12px; margin-bottom: 10px; }

        .uploader-row { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; }
        .uploader-info { display: flex; align-items: center; gap: 10px; }
        .uploader-pic { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
        .uploader-name { font-weight: 600; font-size: 14px; }
        .sub-btn { background: white; color: black; border: none; padding: 6px 14px; border-radius: 18px; font-weight: bold; font-size: 12px; cursor: pointer; }
        .sub-btn.subscribed { background: #333; color: white; }

        /* POLLS & IMAGES */
        .image-post { width: 100%; height: auto; max-height: 500px; object-fit: contain; display: block; }
        .poll-container { padding: 20px; background: #1a1a1a; margin: 0 15px; border-radius: 8px; }
        .poll-question { font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .poll-option { background: #333; margin-bottom: 8px; border-radius: 4px; padding: 10px; position: relative; cursor: pointer; overflow: hidden; }
        .poll-bg { position: absolute; top:0; left:0; height:100%; background: rgba(255,0,80,0.4); z-index:1; width:0%; transition: width 0.3s; }
        .poll-content { position: relative; z-index:2; display: flex; justify-content: space-between; font-size: 13px; }

        /* ACTIONS */
        .action-row { display: flex; align-items: center; justify-content: space-around; margin-top: 10px; border-top: 1px solid #222; padding-top: 10px; }
        .action-item { cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 13px; color: #aaa; }
        .action-item:hover { color: white; }
        .action-icon { font-size: 18px; }
        .liked .action-icon { color: #3ea6ff; }
        .hearted .action-icon { color: #ff0050; }

        /* COMMENTS */
        .comments-area { padding: 10px 15px; background: #151515; display: none; border-top: 1px solid #222; }
        .comments-area.show { display: block; }
        .comment-input-row { display: flex; gap: 10px; margin-top: 10px; }
        .comment-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid #444; color: white; padding: 5px; outline: none; }
        .post-btn { color: #3ea6ff; background: none; border: none; font-weight: bold; cursor: pointer; }
        .comment-list { max-height: 150px; overflow-y: auto; font-size: 13px; }
        .single-comment { margin-bottom: 6px; }
        .comment-user { font-weight: bold; color: #888; margin-right: 5px; }

        /* SCREENS & MODALS */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; z-index: 100; display: flex; flex-direction: column; }
        .screen.hidden { display: none; }
        .login-box { padding: 40px; text-align: center; margin: auto; width: 100%; max-width: 320px; }
        .input-field { width: 100%; padding: 12px; background: #222; border: 1px solid #333; border-radius: 6px; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .primary-btn { width: 100%; padding: 12px; background: #ff0050; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }
        .modal-card { width: 90%; max-width: 350px; background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        
        .upload-tabs { display: flex; border-bottom: 1px solid #333; margin-bottom: 15px; }
        .tab-btn { flex: 1; background: none; border: none; color: #aaa; padding: 10px; cursor: pointer; }
        .tab-btn.active { color: white; border-bottom: 2px solid #ff0050; font-weight: bold; }
        .upload-section { display: none; }
        .upload-section.active { display: block; }

        /* LOADING */
        #loadingOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#0f0f0f; z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; }
        .spinner { width:30px; height:30px; border:3px solid #333; border-top-color:#ff0050; border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

<!-- Loading overlay while Firebase initializes -->
<div id="loadingOverlay">
    <div style="font-weight:900; font-size:24px; background:linear-gradient(to right,#ff0050,#ff4b4b); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">ZXYwatch</div>
    <div class="spinner"></div>
</div>

<div class="app-container">
    <div class="header">
        <div class="logo" onclick="renderFeed()">ZXYwatch</div>
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="Search" onkeyup="renderFeed()">
        </div>
        <div class="header-icons">
            <button class="icon-btn" onclick="openUploadModal()">+</button>
            <img id="headerAvatar" class="user-mini-avatar" src="" onclick="openProfileModal()">
        </div>
    </div>

    <div id="videoFeed" class="feed-container"></div>
</div>

<div id="loginScreen" class="screen">
    <div class="login-box">
        <h1 style="font-weight:900; margin-bottom:30px;">ZXYwatch</h1>
        <label style="cursor:pointer; margin-bottom:20px; display:inline-block;">
            <img id="loginPreview" src="https://ui-avatars.com/api/?name=User&background=333&color=fff" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid #ff0050;">
            <input type="file" style="display:none" onchange="handleAvatarUpload(this)">
            <div style="font-size:12px; color:#aaa; margin-top:5px;">Tap to add photo</div>
        </label>
        <form onsubmit="event.preventDefault(); attemptLogin();">
            <input type="text" id="usernameInput" class="input-field" placeholder="Username" required>
            <input type="password" id="passwordInput" class="input-field" placeholder="Password" required>
            <button type="submit" id="loginBtn" class="primary-btn">Enter</button>
        </form>
        <div id="loginError" style="color:#ff4b4b; font-size:13px; margin-top:10px;"></div>
    </div>
</div>

<div id="uploadModal" class="modal">
    <div class="modal-card">
        <h3>Create Post</h3>
        <div class="upload-tabs">
            <button class="tab-btn active" onclick="setUploadType('video')">Video</button>
            <button class="tab-btn" onclick="setUploadType('image')">Picture</button>
            <button class="tab-btn" onclick="setUploadType('poll')">Poll</button>
        </div>
        
        <input type="text" id="postTitle" class="input-field" placeholder="Title">
        <textarea id="postDesc" class="input-field" placeholder="Description (Tell us about it...)" rows="3"></textarea>

        <div id="sect-video" class="upload-section active">
            <input type="file" id="vidFile" class="input-field" accept="video/*">
            <p style="font-size:11px; color:#aaa;">Supports 30+ Mins</p>
        </div>
        <div id="sect-image" class="upload-section">
            <input type="file" id="imgFile" class="input-field" accept="image/*">
        </div>
        <div id="sect-poll" class="upload-section">
            <input type="text" id="pollOpt1" class="input-field" placeholder="Option 1">
            <input type="text" id="pollOpt2" class="input-field" placeholder="Option 2">
        </div>

        <button id="postBtn" class="primary-btn" onclick="startUploadProcess()">Post</button>
        <div id="uploadStatus" style="display:none; color:#3ea6ff; margin-top:10px; font-size:12px; text-align:center;">Processing...</div>
        <div id="uploadProgress" style="display:none; background:#222; border-radius:4px; height:6px; margin-top:8px; overflow:hidden;">
            <div id="progressBar" style="height:100%; background:#ff0050; width:0%; transition:width 0.3s;"></div>
        </div>
        <button onclick="closeUploadModal()" style="width:100%; background:none; border:none; color:#aaa; margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="profileModal" class="modal">
    <div class="modal-card" style="text-align:center;">
        <img id="statsAvatar" src="" style="width:60px; height:60px; border-radius:50%; margin-bottom:10px;">
        <h2 id="statsName" style="margin:0;">Name</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:20px 0;">
            <div style="background:#2a2a2a; padding:10px; border-radius:8px;">
                <span id="countSubs" style="display:block; font-size:18px; font-weight:bold;">0</span>
                <span style="font-size:11px; color:#aaa;">Subs</span>
            </div>
            <div style="background:#2a2a2a; padding:10px; border-radius:8px;">
                <span id="countViews" style="display:block; font-size:18px; font-weight:bold;">0</span>
                <span style="font-size:11px; color:#aaa;">Views</span>
            </div>
            <div style="background:#2a2a2a; padding:10px; border-radius:8px;">
                <span id="countLikes" style="display:block; font-size:18px; font-weight:bold;">0</span>
                <span style="font-size:11px; color:#aaa;">Likes</span>
            </div>
        </div>
        <button onclick="logout()" style="color:#ff4b4b; background:none; border:1px solid #333; padding:8px 20px; border-radius:20px; cursor:pointer;">Log Out</button>
        <button onclick="document.getElementById('profileModal').classList.remove('active')" style="margin-top:15px; display:block; width:100%; background:none; border:none; color:white; cursor:pointer;">Close</button>
        <button onclick="clearAllData()" style="font-size:10px; color:#555; background:none; border:none; cursor:pointer; margin-top:10px;">Reset App Data</button>
    </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
// ============================================================
//   PASTE YOUR FIREBASE CONFIG HERE
//   Get it from: Firebase Console → Project Settings → Your Apps → Web App
// ============================================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, addDoc, query, orderBy, onSnapshot, arrayUnion, arrayRemove, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
    // PASTE YOUR CONFIG VALUES BELOW:
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};
// ============================================================

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// Hide loading overlay once Firebase is ready
document.getElementById('loadingOverlay').style.display = 'none';

// --- GLOBALS ---
let currentUser = null;
let currentUploadType = 'video';
let tempAvatar = "";
let feedCache = []; // local cache so we can search without re-fetching

// --- AUTH ---
window.handleAvatarUpload = function(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => { tempAvatar = e.target.result; document.getElementById('loginPreview').src = tempAvatar; };
        reader.readAsDataURL(input.files[0]);
    }
};

window.attemptLogin = async function() {
    const name = document.getElementById('usernameInput').value.trim();
    const pass = document.getElementById('passwordInput').value.trim();
    const errEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');
    if (!name || !pass) return;

    btn.disabled = true;
    btn.innerText = "...";
    errEl.innerText = "";

    const userRef = doc(db, "users", name);
    const userSnap = await getDoc(userRef);

    if (!userSnap.exists()) {
        // New user — register
        const avatar = tempAvatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=333&color=fff`;
        await setDoc(userRef, { password: pass, avatar, subscribers: [], name });
        currentUser = { name, avatar, subscribers: [] };
    } else {
        const data = userSnap.data();
        if (data.password !== pass) {
            errEl.innerText = "Wrong password.";
            btn.disabled = false;
            btn.innerText = "Enter";
            return;
        }
        currentUser = { name, ...data };
    }

    sessionStorage.setItem('ZXY_Session', JSON.stringify({ name: currentUser.name, avatar: currentUser.avatar }));
    setupApp();
    btn.disabled = false;
    btn.innerText = "Enter";
};

function setupApp() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('headerAvatar').src = currentUser.avatar;
    renderFeed();
}

window.logout = function() { sessionStorage.removeItem('ZXY_Session'); location.reload(); };

// Auto-login from session
const session = sessionStorage.getItem('ZXY_Session');
if (session) {
    currentUser = JSON.parse(session);
    setupApp();
} else {
    document.getElementById('loginScreen').classList.remove('hidden');
}

// --- UPLOAD ---
window.openUploadModal = function() { document.getElementById('uploadModal').classList.add('active'); };
window.closeUploadModal = function() {
    document.getElementById('uploadModal').classList.remove('active');
    document.getElementById('uploadStatus').style.display = 'none';
    document.getElementById('uploadProgress').style.display = 'none';
    document.getElementById('postBtn').disabled = false;
};

window.setUploadType = function(type) {
    currentUploadType = type;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.upload-section').forEach(s => s.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(`sect-${type}`).classList.add('active');
};

function generateThumbnail(file) {
    return new Promise(resolve => {
        const video = document.createElement('video');
        video.src = URL.createObjectURL(file);
        video.currentTime = 1.0;
        video.muted = true;
        video.onseeked = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 320;
            canvas.height = (320 / video.videoWidth) * video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        video.onerror = () => resolve(null);
    });
}

function uploadFileToStorage(file, path, onProgress) {
    return new Promise((resolve, reject) => {
        const storageRef = ref(storage, path);
        const task = uploadBytesResumable(storageRef, file);
        task.on('state_changed',
            snap => onProgress && onProgress(Math.round((snap.bytesTransferred / snap.totalBytes) * 100)),
            reject,
            async () => resolve(await getDownloadURL(task.snapshot.ref))
        );
    });
}

window.startUploadProcess = async function() {
    const title = document.getElementById('postTitle').value.trim();
    const desc = document.getElementById('postDesc').value.trim();
    if (!title) return alert("Please add a title.");

    const btn = document.getElementById('postBtn');
    const statusEl = document.getElementById('uploadStatus');
    const progressEl = document.getElementById('uploadProgress');
    const bar = document.getElementById('progressBar');
    btn.disabled = true;
    statusEl.style.display = 'block';
    progressEl.style.display = 'none';

    let mediaURL = null, thumbnail = null, pollData = null;
    const postId = Date.now().toString();

    try {
        if (currentUploadType === 'video') {
            const file = document.getElementById('vidFile').files[0];
            if (!file) { btn.disabled = false; return alert("Select a video."); }

            statusEl.innerText = "Generating preview...";
            thumbnail = await generateThumbnail(file);

            statusEl.innerText = "Uploading video...";
            progressEl.style.display = 'block';
            mediaURL = await uploadFileToStorage(file, `media/${postId}_video`, pct => { bar.style.width = pct + '%'; });

        } else if (currentUploadType === 'image') {
            const file = document.getElementById('imgFile').files[0];
            if (!file) { btn.disabled = false; return alert("Select an image."); }
            statusEl.innerText = "Uploading image...";
            progressEl.style.display = 'block';
            mediaURL = await uploadFileToStorage(file, `media/${postId}_image`, pct => { bar.style.width = pct + '%'; });

        } else if (currentUploadType === 'poll') {
            const o1 = document.getElementById('pollOpt1').value.trim();
            const o2 = document.getElementById('pollOpt2').value.trim();
            if (!o1 || !o2) { btn.disabled = false; return alert("2 options required."); }
            pollData = { options: [o1, o2], votes: [0, 0], voters: [] };
        }

        statusEl.innerText = "Saving post...";

        const newPost = {
            id: postId,
            type: currentUploadType,
            title,
            description: desc,
            uploader: currentUser.name,
            uploaderAvatar: currentUser.avatar,
            timestamp: new Date().toLocaleDateString(),
            thumbnail: thumbnail || null,
            mediaURL: mediaURL || null,
            likes: [],
            hearts: [],
            comments: [],
            poll: pollData,
            views: 0,
            createdAt: Date.now()
        };

        await setDoc(doc(db, "posts", postId), newPost);

        closeUploadModal();
        document.getElementById('postTitle').value = "";
        document.getElementById('postDesc').value = "";
        document.getElementById('vidFile').value = "";
        renderFeed();

    } catch (err) {
        console.error(err);
        alert("Upload failed: " + err.message);
        btn.disabled = false;
        statusEl.style.display = 'none';
    }
};

// --- RENDER ---
window.renderFeed = async function() {
    const container = document.getElementById('videoFeed');
    const query2 = document.getElementById('searchInput').value.toLowerCase();

    // If cache is empty, fetch from Firestore
    if (feedCache.length === 0) {
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        feedCache = snap.docs.map(d => d.data());
    }

    container.innerHTML = "";
    const feed = feedCache.filter(p => !query2 || p.title.toLowerCase().includes(query2));

    if (feed.length === 0) {
        container.innerHTML = `<div style="text-align:center; color:#555; padding:60px 20px;">No posts yet. Be the first to post!</div>`;
        return;
    }

    feed.forEach(post => {
        const isSub = false; // Handled per-click for simplicity
        const isLiked = post.likes && post.likes.includes(currentUser.name);
        const isHearted = post.hearts && post.hearts.includes(currentUser.name);

        let contentHTML = '';

        if (post.type === 'video') {
            contentHTML = `
                <div class="media-wrapper" 
                     onmouseenter="startPreview('${post.id}', '${post.mediaURL}')" 
                     onmouseleave="stopPreview('${post.id}')">
                    <img id="thumb-${post.id}" class="video-thumbnail" src="${post.thumbnail || ''}">
                    <video id="player-${post.id}" class="video-player" muted loop playsinline></video>
                </div>
            `;
        } else if (post.type === 'image') {
            contentHTML = `<img class="image-post" src="${post.mediaURL || ''}">`;
        } else if (post.type === 'poll') {
            const total = post.poll.votes.reduce((a, b) => a + b, 0);
            const voted = post.poll.voters && post.poll.voters.includes(currentUser.name);
            const opts = post.poll.options.map((opt, i) => {
                const pct = total ? Math.round((post.poll.votes[i] / total) * 100) : 0;
                return `<div class="poll-option" onclick="votePoll('${post.id}', ${i})">
                            <div class="poll-bg" style="width:${voted ? pct : 0}%"></div>
                            <div class="poll-content"><span>${opt}</span>${voted ? `<span>${pct}%</span>` : ''}</div>
                        </div>`;
            }).join('');
            contentHTML = `<div class="poll-container"><div class="poll-question">${post.title}</div>${opts}</div>`;
        }

        const div = document.createElement('div');
        div.className = 'video-card';
        div.innerHTML = `
            ${contentHTML}
            <div class="meta-data">
                ${post.type !== 'poll' ? `<span class="video-title">${post.title}</span>` : ''}
                ${post.description ? `<div class="video-desc" onclick="this.classList.toggle('expanded')">${post.description}</div>` : ''}
                <div class="video-stats">${post.timestamp}</div>
                
                <div class="uploader-row">
                    <div class="uploader-info">
                        <img src="${post.uploaderAvatar || ''}" class="uploader-pic">
                        <span class="uploader-name">${post.uploader}</span>
                    </div>
                    ${post.uploader !== currentUser.name ? 
                    `<button class="sub-btn" id="sub-${post.id}" onclick="toggleSub('${post.uploader}', '${post.id}')">Subscribe</button>` : ''}
                </div>

                <div class="action-row">
                    <div class="action-item ${isLiked ? 'liked' : ''}" id="like-${post.id}" onclick="toggleLike('${post.id}')"><span class="action-icon">👍</span> <span id="likeCount-${post.id}">${(post.likes || []).length}</span></div>
                    <div class="action-item ${isHearted ? 'hearted' : ''}" id="heart-${post.id}" onclick="toggleHeart('${post.id}')"><span class="action-icon">❤️</span> <span id="heartCount-${post.id}">${(post.hearts || []).length}</span></div>
                    <div class="action-item" onclick="toggleComments('${post.id}')"><span class="action-icon">💬</span> <span id="commentCount-${post.id}">${(post.comments || []).length}</span></div>
                </div>

                <div id="comments-${post.id}" class="comments-area">
                    <div class="comment-list" id="commentList-${post.id}">
                        ${(post.comments || []).map(c => `<div class="single-comment"><span class="comment-user">${c.user}</span> ${c.text}</div>`).join('')}
                    </div>
                    <div class="comment-input-row">
                        <input type="text" id="input-${post.id}" class="comment-input" placeholder="Comment...">
                        <button class="post-btn" onclick="postComment('${post.id}')">Post</button>
                    </div>
                </div>
            </div>
        `;
        container.appendChild(div);

        // Check subscription status
        if (post.uploader !== currentUser.name) {
            getDoc(doc(db, "users", post.uploader)).then(snap => {
                if (snap.exists()) {
                    const subs = snap.data().subscribers || [];
                    const btn = document.getElementById(`sub-${post.id}`);
                    if (btn) {
                        if (subs.includes(currentUser.name)) { btn.innerText = 'Subscribed'; btn.classList.add('subscribed'); }
                        else { btn.innerText = 'Subscribe'; btn.classList.remove('subscribed'); }
                    }
                }
            });
        }
    });
};

// Subscribe to real-time feed updates
onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), snap => {
    feedCache = snap.docs.map(d => d.data());
    if (currentUser) renderFeed();
});

// --- VIDEO PREVIEW ---
window.startPreview = async function(id, mediaURL) {
    const vid = document.getElementById(`player-${id}`);
    const thumb = document.getElementById(`thumb-${id}`);
    if (!vid) return;
    if (!vid.src && mediaURL) vid.src = mediaURL;
    thumb.style.opacity = '0';
    vid.style.display = 'block';
    vid.controls = true;
    vid.muted = true;
    vid.play().catch(() => {});
};

window.stopPreview = function(id) {
    const vid = document.getElementById(`player-${id}`);
    const thumb = document.getElementById(`thumb-${id}`);
    vid.pause();
    vid.currentTime = 0;
    vid.style.display = 'none';
    vid.controls = false;
    thumb.style.opacity = '1';
};

// --- INTERACTIONS ---
window.votePoll = async function(postId, idx) {
    const postRef = doc(db, "posts", postId);
    const postSnap = await getDoc(postRef);
    const post = postSnap.data();
    if (post.poll.voters && post.poll.voters.includes(currentUser.name)) return;

    const newVotes = [...post.poll.votes];
    newVotes[idx]++;
    const newVoters = [...(post.poll.voters || []), currentUser.name];
    await updateDoc(postRef, { "poll.votes": newVotes, "poll.voters": newVoters });

    // Update cache
    const idx2 = feedCache.findIndex(p => p.id === postId);
    if (idx2 !== -1) { feedCache[idx2].poll.votes = newVotes; feedCache[idx2].poll.voters = newVoters; }
    renderFeed();
};

window.toggleLike = async function(id) {
    const postRef = doc(db, "posts", id);
    const post = feedCache.find(p => p.id === id);
    const isLiked = post && post.likes && post.likes.includes(currentUser.name);

    if (isLiked) {
        await updateDoc(postRef, { likes: arrayRemove(currentUser.name) });
        post.likes = post.likes.filter(n => n !== currentUser.name);
    } else {
        await updateDoc(postRef, { likes: arrayUnion(currentUser.name) });
        if (!post.likes) post.likes = [];
        post.likes.push(currentUser.name);
    }

    const el = document.getElementById(`like-${id}`);
    const countEl = document.getElementById(`likeCount-${id}`);
    if (el) { isLiked ? el.classList.remove('liked') : el.classList.add('liked'); }
    if (countEl) countEl.innerText = post.likes.length;
};

window.toggleHeart = async function(id) {
    const postRef = doc(db, "posts", id);
    const post = feedCache.find(p => p.id === id);
    const isHearted = post && post.hearts && post.hearts.includes(currentUser.name);

    if (isHearted) {
        await updateDoc(postRef, { hearts: arrayRemove(currentUser.name) });
        post.hearts = post.hearts.filter(n => n !== currentUser.name);
    } else {
        await updateDoc(postRef, { hearts: arrayUnion(currentUser.name) });
        if (!post.hearts) post.hearts = [];
        post.hearts.push(currentUser.name);
    }

    const el = document.getElementById(`heart-${id}`);
    const countEl = document.getElementById(`heartCount-${id}`);
    if (el) { isHearted ? el.classList.remove('hearted') : el.classList.add('hearted'); }
    if (countEl) countEl.innerText = post.hearts.length;
};

window.toggleSub = async function(creator, postId) {
    const userRef = doc(db, "users", creator);
    const snap = await getDoc(userRef);
    const subs = snap.data().subscribers || [];
    const btn = document.getElementById(`sub-${postId}`);

    if (subs.includes(currentUser.name)) {
        await updateDoc(userRef, { subscribers: arrayRemove(currentUser.name) });
        if (btn) { btn.innerText = 'Subscribe'; btn.classList.remove('subscribed'); }
    } else {
        await updateDoc(userRef, { subscribers: arrayUnion(currentUser.name) });
        if (btn) { btn.innerText = 'Subscribed'; btn.classList.add('subscribed'); }
    }
};

window.toggleComments = function(id) { document.getElementById(`comments-${id}`).classList.toggle('show'); };

window.postComment = async function(id) {
    const val = document.getElementById(`input-${id}`).value.trim();
    if (!val) return;
    const postRef = doc(db, "posts", id);
    const comment = { user: currentUser.name, text: val };
    await updateDoc(postRef, { comments: arrayUnion(comment) });

    // Update local cache
    const post = feedCache.find(p => p.id === id);
    if (post) { if (!post.comments) post.comments = []; post.comments.push(comment); }

    // Update DOM directly (no full re-render)
    const list = document.getElementById(`commentList-${id}`);
    if (list) list.innerHTML += `<div class="single-comment"><span class="comment-user">${comment.user}</span> ${comment.text}</div>`;
    const countEl = document.getElementById(`commentCount-${id}`);
    if (countEl && post) countEl.innerText = post.comments.length;
    document.getElementById(`input-${id}`).value = "";
};

window.openProfileModal = async function() {
    const userRef = doc(db, "users", currentUser.name);
    const snap = await getDoc(userRef);
    const user = snap.data();
    const myPosts = feedCache.filter(p => p.uploader === currentUser.name);
    let views = 0, likes = 0;
    myPosts.forEach(p => { views += (p.views || 0); likes += (p.likes || []).length; });

    document.getElementById('statsAvatar').src = user.avatar;
    document.getElementById('statsName').innerText = currentUser.name;
    document.getElementById('countSubs').innerText = (user.subscribers || []).length;
    document.getElementById('countViews').innerText = views;
    document.getElementById('countLikes').innerText = likes;
    document.getElementById('profileModal').classList.add('active');
};

window.clearAllData = function() {
    if (prompt("Admin:") === "qwertyuiop") {
        alert("To fully reset, delete collections in your Firebase Console.");
    }
};

</script>
